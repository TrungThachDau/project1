<nav>
  <mat-toolbar>
    <section>
      <div class="example-button-row">
        <button mat-button routerLink="/home">Trang chủ</button>
        <button *ngFor="let btn of navButton"
                mat-button
                routerLink="{{ btn.path }}"
                [disabled]="!hasPermission(btn.permission)">
          {{ btn.name }}
        </button>


      </div>
    </section>
    <span class="example-spacer"></span>
    <button mat-button [matMenuTriggerFor]="menu"><mat-icon>person</mat-icon></button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item routerLink="/changepassword">Đổi mật khẩu</button>
      <button mat-menu-item>...</button>
      <button mat-menu-item (click)="signOut()">Đăng xuất</button>
    </mat-menu>
  </mat-toolbar>

</nav>
