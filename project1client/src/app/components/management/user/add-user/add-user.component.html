<app-navbar></app-navbar>
<div class="container-fluid">
  <div class="list-section">
  <app-user-list-section></app-user-list-section>
  </div>
  <div class="form-section">
    <h4>Thêm người dùng</h4>
    <form class="add-user-form" (ngSubmit)="addUser()">
      <mat-form-field class="add-user-full-width">
        <mat-label>Họ và tên</mat-label>
        <input [(ngModel)]="name" name="name" matInput placeholder="Vd. Nguyễn Văn A">
      </mat-form-field>

      <mat-form-field class="add-user-full-width">
        <mat-label>Email</mat-label>
        <input [(ngModel)]="email" name="email" type="email" matInput [formControl]="emailFormControl" placeholder="Vd. pat@example.com">
        @if (emailFormControl.hasError('email') && !emailFormControl.hasError('required')) {
          <mat-error>Vui lòng nhập đúng định dạng email.</mat-error>
        }
        @if (emailFormControl.hasError('required')) {
          <mat-error>Email là <strong>bắt buộc</strong>.</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="add-user-full-width">
        <mat-label>Địa chỉ</mat-label>
        <textarea [(ngModel)]="address" name="address" matInput placeholder="Vd. 100 Tự Do"></textarea>
      </mat-form-field>

      <mat-form-field class="add-user-full-width">
        <mat-label>Số điện thoại</mat-label>
        <span matTextPrefix>+84 &nbsp;</span>
        <input [(ngModel)]="phone" name="phone" type="tel" matInput placeholder="555-555-1234">
        <mat-icon matSuffix>mode_edit</mat-icon>
      </mat-form-field>

      <mat-form-field class="add-user-full-width">
        <mat-label>Vai trò</mat-label>
        <mat-select [(ngModel)]="selectedValue" name="role">
          <mat-option *ngFor="let role of roles" [value]="role.id_role">
            {{ role.name_role }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <button mat-flat-button type="submit">Thêm</button>
    </form>

  </div>
</div>
